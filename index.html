<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gemelo Digital - Puente Atirantado</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b0e14; color: white; font-family: sans-serif; }
        .hud-grid { position: absolute; top: 20px; left: 20px; z-index: 10; display: grid; gap: 10px; }
        .hud-card { background: rgba(0,0,0,0.7); padding: 10px; border-left: 3px solid #2ea043; }
        #canvas3d { width: 100vw; height: 100vh; position: absolute; }
    </style>
</head>
<body>
    <div class="hud-grid">
        <div class="hud-card">Nivel Agua: <span id="val-agua">0</span> cm</div>
        <div class="hud-card">Temp: <span id="val-temp">0</span> °C</div>
        <div class="hud-card" id="card-alerta">Estado: <span id="val-alerta">Normal</span></div>
    </div>
    <div id="canvas3d"></div>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    // CONFIGURACIÓN DE LECTURA
    const CHANNEL_ID = '3420779'; // Tu ID de canal
    
    let scene = new THREE.Scene();
    let camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(30, 20, 30);
    let renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas3d').appendChild(renderer.domElement);
    new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1));

    // Elemento fuego simple (esfera roja)
    const fuegoGeo = new THREE.SphereGeometry(2, 16, 16);
    const fuegoMat = new THREE.MeshBasicMaterial({ color: 0xff4500 });
    const objetoFuego = new THREE.Mesh(fuegoGeo, fuegoMat);
    objetoFuego.position.set(0, 5, 0);
    objetoFuego.visible = false;
    scene.add(objetoFuego);

    async function actualizar() {
        try {
            // ThingSpeak envía los datos en 'feeds'
            const res = await fetch(`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json`);
            const d = await res.json();
            
            const temp = parseFloat(d.field1);
            const agua = parseFloat(d.field3);
            
            // Actualizar HUD
            document.getElementById('val-temp').innerText = temp.toFixed(1);
            document.getElementById('val-agua').innerText = agua.toFixed(1);
            
            // Lógica de Fuego y Alerta
            if(temp > 21.0) {
                objetoFuego.visible = true;
                document.getElementById('val-alerta').innerText = "¡INCENDIO!";
                document.getElementById('card-alerta').style.borderColor = "red";
            } else {
                objetoFuego.visible = false;
                document.getElementById('val-alerta').innerText = "Normal";
                document.getElementById('card-alerta').style.borderColor = "#2ea043";
            }
        } catch(e) { console.log("Error leyendo ThingSpeak"); }
    }

    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    
    animate();
    setInterval(actualizar, 5000); // Actualiza cada 5 segundos
</script>
</body>
</html>
