<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemelo Digital - Puente</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: Arial, sans-serif; }
        #overlay { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); color: white; padding: 15px 20px; border-radius: 8px; z-index: 10; font-size: 14px; }
        .val { color: #00d2ff; font-weight: bold; }
        .fuego { color: #ff4444; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="overlay">
        <h3 style="margin-top:0;">🌉 Gemelo Digital en Vivo</h3>
        <p>Agua (HC-SR04): <span id="txt-agua" class="val">--</span> cm</p>
        <p>Inclinación X (MPU): <span id="txt-rotx" class="val">--</span> G</p>
        <p>Temperatura (DHT22): <span id="txt-temp" class="val">--</span> °C</p>
        <p>Estado Incendio: <span id="txt-fuego">Normal</span></p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // CREDENCIALES THINGER.IO
        const THINGER_USER = "edson75";
        const DEVICE_ID = "Puente_ESP32";
        const RESOURCE_ID = "sensores";
        const BEARER_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJQdWVudGUiLCJzdnIiOiJ1cy1lYXN0LmF3cy50aGluZ2VyLmlvIiwidXNyIjoiZWRzb243NSJ9.WJeOjMS8DJ4Y03kTvqcA9l8IEBiZe53t1XQpcp3IoOQ";
        
        const API_URL = `https://us-east.aws.thinger.io/v2/users/${THINGER_USER}/devices/${DEVICE_ID}/${RESOURCE_ID}`;

        // ESCENA 3D
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 20, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(10, 30, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        let puenteTablero = null;
        let aguaSuperficie = null;
        let marcadorFuego = null;

        const matFuego = new THREE.MeshBasicMaterial({ color: 0xff0000 });

        // CARGA DEL ARCHIVO .GLB SUBIDO A GITHUB
        // Reemplaza 'modelo_puente.glb' si tu archivo subido tiene otro nombre exacto
        const loader = new GLTFLoader();
        loader.load('modelo_puente.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);
            console.log("¡Modelo 3D cargado!");

            puenteTablero = model.getObjectByName('Tablero_Puente') || model;
            aguaSuperficie = model.getObjectByName('Superficie_Agua');
            marcadorFuego = model.getObjectByName('Punto_Sensor_Temp');

            if (marcadorFuego) marcadorFuego.visible = false;
        }, undefined, (err) => {
            console.error("Error cargando el modelo GLB. Verifica que el nombre del archivo en GitHub sea idéntico.", err);
        });

        // CONSULTA DE DATOS EN TIEMPO REAL
        async function pedirDatos() {
            try {
                const res = await fetch(API_URL, {
                    headers: { 'Authorization': `Bearer ${BEARER_TOKEN}` }
                });
                const json = await res.json();
                const datos = json.in ? json.in.out : (json.out || json);

                actualizar3D(datos);
            } catch (e) {
                console.log("Esperando conexión con ESP32...");
            }
        }

        setInterval(pedirDatos, 300);

        function actualizar3D(d) {
            const temp = d.temperatura || 0;
            const dist = d.distancia_agua || 0;
            const rotX = d.inclinacion_x || 0;
            const rotY = d.inclinacion_y || 0;

            document.getElementById('txt-agua').innerText = dist.toFixed(1);
            document.getElementById('txt-rotx').innerText = rotX.toFixed(3);
            document.getElementById('txt-temp').innerText = temp.toFixed(1);

            if (puenteTablero) {
                puenteTablero.rotation.z = rotX * 0.2;
                puenteTablero.rotation.x = rotY * 0.2;
            }

            if (aguaSuperficie) {
                aguaSuperficie.position.y = (100 - dist) * 0.05;
            }

            const txtFuego = document.getElementById('txt-fuego');
            if (temp > 45) {
                txtFuego.innerText = "¡ALERTA DE FUEGO!";
                txtFuego.className = "fuego";
                if (marcadorFuego) {
                    marcadorFuego.visible = true;
                    marcadorFuego.material = matFuego;
                }
            } else {
                txtFuego.innerText = "Normal";
                txtFuego.className = "";
                if (marcadorFuego) marcadorFuego.visible = false;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
