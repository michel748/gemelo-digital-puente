<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemelo Digital - Puente</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: Arial, sans-serif; }
        #overlay { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); color: white; padding: 15px 20px; border-radius: 8px; z-index: 10; font-size: 14px; }
        .val { color: #00d2ff; font-weight: bold; }
        .fuego { color: #ff4444; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <div id="overlay">
        <h3 style="margin-top:0;">🌉 Gemelo Digital en Vivo</h3>
        <p>Agua (HC-SR04): <span id="txt-agua" class="val">--</span> cm</p>
        <p>Inclinación X (MPU): <span id="txt-rotx" class="val">--</span> G</p>
        <p>Temperatura (DHT22): <span id="txt-temp" class="val">--</span> °C</p>
        <p>Estado Incendio: <span id="txt-fuego">Normal</span></p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const THINGER_USER = "edson75";
        const DEVICE_ID = "Puente_ESP32";
        const RESOURCE_ID = "sensores";
        const BEARER_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJXZWJUb2tlbiIsInN2ciI6InVzLWVhc3QuYXdzLnRoaW5nZXIuaW8iLCJ1c3IiOiJlZHNvbjc1In0.hDtWxwbIQYjls3Z5YHZ029BFzM2gwIuER8PctgCeDoY";
        
        const API_URL = `https://us-east.aws.thinger.io/v2/users/${THINGER_USER}/devices/${DEVICE_ID}/${RESOURCE_ID}`;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 20, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 2.0));
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
        dirLight.position.set(10, 30, 10);
        scene.add(dirLight);

        let puenteTablero = null, aguaSuperficie = null, marcadorFuego = null;

        const loader = new GLTFLoader();
        // RUTA ACTUALIZADA AL NUEVO ARCHIVO
        const modelUrl = 'https://raw.githubusercontent.com/michel748/gemelo-digital-puente/main/PUENTES.glb';

        loader.load(modelUrl, (gltf) => {
            const model = gltf.scene;
            scene.add(model);
            
            console.log("Estructura del modelo cargado:", model);

            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); 

            puenteTablero = model.getObjectByName('Tablero_Puente') || model;
            aguaSuperficie = model.getObjectByName('Superficie_Agua');
            marcadorFuego = model.getObjectByName('Punto_Sensor_Temp');
        }, undefined, (err) => {
            console.error("Error al cargar el modelo:", err);
        });

        async function pedirDatos() {
            try {
                const res = await fetch(API_URL, { headers: { 'Authorization': `Bearer ${BEARER_TOKEN}` } });
                if (!res.ok) return;
                const json = await res.json();
                const d = json.in ? json.in.out : (json.out || json);

                document.getElementById('txt-agua').innerText = (d.distancia_agua || 0).toFixed(1);
                document.getElementById('txt-rotx').innerText = (d.inclinacion_x || 0).toFixed(3);
                document.getElementById('txt-temp').innerText = (d.temperatura || 0).toFixed(1);

                if (puenteTablero) {
                    puenteTablero.rotation.z = (d.inclinacion_x || 0) * 0.2;
                }
                if (aguaSuperficie) {
                    aguaSuperficie.position.y = (100 - (d.distancia_agua || 0)) * 0.05;
                }
            } catch (e) { console.error("Error en conexión Thinger.io"); }
        }

        setInterval(pedirDatos, 300);
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
