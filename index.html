<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gemelo Digital Integrado</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0e14; }
        #overlay { position: absolute; top: 15px; left: 15px; z-index: 10; color: white; font-family: sans-serif; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; }
        .val { color: #00d2ff; font-weight: bold; }
        #canvas3d { width: 100%; height: 100%; position: absolute; }
    </style>
</head>
<body>

<div id="overlay">
    <h3>Estado del Puente</h3>
    <p>Agua: <span id="txt-agua" class="val">--</span> cm</p>
    <p>Inclinación: <span id="txt-rot" class="val">--</span> °</p>
    <p>Temp: <span id="txt-temp" class="val">--</span> °C</p>
</div>
<div id="canvas3d"></div>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    let scene, camera, renderer, tablero, agua, fuegoParticulas;
    const CHANNEL_ID = '3420779'; // Tu canal actual

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0e14);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(30, 30, 30);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas3d').appendChild(renderer.domElement);
    new OrbitControls(camera, renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));

    // Crear Fuego (Sistema de partículas)
    const geomFuego = new THREE.BufferGeometry();
    const posFuego = new Float32Array(150 * 3);
    geomFuego.setAttribute('position', new THREE.BufferAttribute(posFuego, 3));
    fuegoParticulas = new THREE.Points(geomFuego, new THREE.PointsMaterial({ 
        color: 0xff4500, size: 0.5, transparent: true, opacity: 0.8 
    }));
    fuegoParticulas.visible = false;
    scene.add(fuegoParticulas);

    new GLTFLoader().load('https://raw.githubusercontent.com/michel748/gemelo-digital-puente/main/PUENTES1.glb', (gltf) => {
        scene.add(gltf.scene);
        tablero = gltf.scene.getObjectByName('Tablero_Puente');
        agua = gltf.scene.getObjectByName('Superficie_Agua');
        if (tablero) tablero.add(fuegoParticulas); // El fuego se mueve con el tablero
    });

    async function actualizar() {
        try {
            const res = await fetch(`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json`);
            const d = await res.json();
            
            const dist = parseFloat(d.field3) || 27;
            const rotX = parseFloat(d.field4) || 0;
            const temp = parseFloat(d.field1) || 0;

            document.getElementById('txt-agua').innerText = dist.toFixed(1);
            document.getElementById('txt-rot').innerText = rotX.toFixed(2);
            document.getElementById('txt-temp').innerText = temp.toFixed(1);

            // Rotación suave
            if (tablero) tablero.rotation.z = THREE.MathUtils.degToRad(rotX) * 0.1;

            // Nivel de agua
            if (agua) agua.position.y = Math.max(0, 27 - dist) * 0.5;

            // Lógica de Fuego
            fuegoParticulas.visible = (temp > 21);
        } catch(e) {}
    }

    setInterval(actualizar, 3000);
    function animate() { 
        requestAnimationFrame(animate); 
        // Animación simple del fuego
        if (fuegoParticulas.visible) {
            fuegoParticulas.rotation.y += 0.1;
        }
        renderer.render(scene, camera); 
    }
    animate();
</script>
</body>
</html>
