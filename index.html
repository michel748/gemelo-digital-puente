<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemelo Digital - Puente</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eef2f5; font-family: Arial, sans-serif; }
        #overlay { position: absolute; top: 15px; left: 15px; background: rgba(255, 255, 255, 0.95); color: #222; padding: 15px 20px; border-radius: 8px; z-index: 10; font-size: 14px; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
        .val { color: #0066cc; font-weight: bold; }
        .fuego { color: #d9534f; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="overlay">
        <h3 style="margin-top:0; color: #333;">🌉 Gemelo Digital en Vivo</h3>
        <p>Agua (HC-SR04): <span id="txt-agua" class="val">--</span> cm</p>
        <p>Inclinación X (MPU): <span id="txt-rotx" class="val">--</span> G</p>
        <p>Temperatura (DHT22): <span id="txt-temp" class="val">--</span> °C</p>
        <p>Estado Incendio: <span id="txt-fuego">Normal</span></p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const THINGER_USER = "edson75";
        const DEVICE_ID = "Puente_ESP32";
        const RESOURCE_ID = "sensores";
        const BEARER_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJXZWJUb2tlbiIsInN2ciI6InVzLWVhc3QuYXdzLnRoaW5nZXIuaW8iLCJ1c3IiOiJlZHNvbjc1In0.hDtWxwbIQYjls3Z5YHZ029BFzM2gwIuER8PctgCeDoY";
        
        const API_URL = `https://us-east.aws.thinger.io/v2/users/${THINGER_USER}/devices/${DEVICE_ID}/${RESOURCE_ID}`;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef2f5);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 2.0);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        let puenteTablero = null;
        let aguaSuperficie = null;
        let marcadorFuego = null;

        // CARGA DE OBJ Y MTL
        const mtlLoader = new MTLLoader();
        mtlLoader.load('puente.mtl', (materials) => {
            materials.preload();
            const objLoader = new OBJLoader();
            objLoader.setMaterials(materials);
            objLoader.load('puente.obj', (object) => {
                const box = new THREE.Box3().setFromObject(object);
                const size = box.getSize(new THREE.Vector3());
                const scale = 25 / Math.max(size.x, size.y, size.z);
                object.scale.set(scale, scale, scale);
                scene.add(object);
                
                puenteTablero = object; 
            });
        });

        async function pedirDatos() {
            try {
                const res = await fetch(API_URL, { headers: { 'Authorization': `Bearer ${BEARER_TOKEN}` } });
                if (!res.ok) return;
                const json = await res.json();
                const datos = json.in ? json.in.out : (json.out || json);
                
                const dist = datos.distancia_agua || 0;
                const rotX = datos.inclinacion_x || 0;
                const temp = datos.temperatura || 0;

                document.getElementById('txt-agua').innerText = dist.toFixed(1);
                document.getElementById('txt-rotx').innerText = rotX.toFixed(3);
                document.getElementById('txt-temp').innerText = temp.toFixed(1);

                if (puenteTablero) {
                    puenteTablero.rotation.z = rotX * 0.2;
                }
            } catch (e) {}
        }

        setInterval(pedirDatos, 500);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
