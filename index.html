<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemelo Digital - Puente - Colores</title>
    <style>
        /* Fondo claro y limpio */
        body { margin: 0; overflow: hidden; background: #fdfdfd; font-family: Arial, sans-serif; }
        #overlay { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.9); color: #333; padding: 15px 20px; border-radius: 8px; z-index: 10; font-size: 14px; border: 1px solid #ccc; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .val { color: #007bff; font-weight: bold; }
        .fuego { color: #d9534f; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="overlay">
        <h3 style="margin-top:0; color: #555;">🌉 Gemelo Digital en Vivo</h3>
        <p>Agua (HC-SR04): <span id="txt-agua" class="val">--</span> cm</p>
        <p>Inclinación X (MPU): <span id="txt-rotx" class="val">--</span> G</p>
        <p>Temperatura (DHT22): <span id="txt-temp" class="val">--</span> °C</p>
        <p>Estado Incendio: <span id="txt-fuego">Normal</span></p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // CREDENCIALES DE THINGER.IO
        const THINGER_USER = "edson75";
        const DEVICE_ID = "Puente_ESP32";
        const RESOURCE_ID = "sensores";
        const BEARER_TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJXZWJUb2tlbiIsInN2ciI6InVzLWVhc3QuYXdzLnRoaW5nZXIuaW8iLCJ1c3IiOiJlZHNvbjc1In0.hDtWxwbIQYjls3Z5YHZ029BFzM2gwIuER8PctgCeDoY";
        
        const API_URL = `https://us-east.aws.thinger.io/v2/users/${THINGER_USER}/devices/${DEVICE_ID}/${RESOURCE_ID}`;

        // ESCENA 3D
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfdfdfd);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 20, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);

        // ILUMINACIÓN (más suave para el fondo claro)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 30, 10);
        scene.add(dirLight);

        let puenteTablero = null;
        let aguaSuperficie = null;
        let marcadorFuego = null;

        const matFuego = new THREE.MeshBasicMaterial({ color: 0xff0000 });

        // ==========================================
        // CARGA DEL ARCHIVO .GLB Y APLICACIÓN DE COLORES
        // ==========================================
        const loader = new GLTFLoader();
        loader.load('puente.glb', (gltf) => {
            const model = gltf.scene;

            // Reencuadres automáticos para centrar el modelo
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            model.position.x += (model.position.x - center.x);
            model.position.y += (model.position.y - center.y);
            model.position.z += (model.position.z - center.z);

            const maxDim = Math.max(size.x, size.y, size.z);
            if (maxDim > 0) {
                const scale = 25 / maxDim;
                model.scale.set(scale, scale, scale);
            }

            camera.position.set(0, 15, 30);
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);
            controls.update();

            // APLICACIÓN DE COLORES A LAS PIEZAS ESPECÍFICAS
            model.traverse((child) => {
                if (child.isMesh) {
                    console.log("Pieza encontrada:", child.name); // Ver los nombres exactos en la consola F12

                    // Árboles y Vegetación -> Verde
                    if (child.name.includes('Arbol') || child.name.includes('Vegetacion')) {
                        child.material = new THREE.MeshStandardMaterial({ color: 0x4d9c6a });
                    }
                    // Pasto y Terreno -> Verde amarillento
                    else if (child.name.includes('Pasto') || child.name.includes('Terreno')) {
                        child.material = new THREE.MeshStandardMaterial({ color: 0xbed28a });
                    }
                    // Pistas (Asfalto) -> Gris oscuro
                    else if (child.name.includes('Pista') || child.name.includes('Asfalto')) {
                        child.material = new THREE.MeshStandardMaterial({ color: 0x4a4a4a });
                    }
                    // Pilares -> Negro (brillante)
                    else if (child.name.includes('Pilar')) {
                        child.material = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.2 });
                    }
                    // Barandillas -> Gris metálico
                    else if (child.name.includes('Barandilla')) {
                        child.material = new THREE.MeshStandardMaterial({ color: 0xcccccc });
                    }
                    // Suelo -> Gris claro
                    else if (child.name.includes('Suelo')) {
                        child.material = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
                    }
                }
            });

            scene.add(model);
            console.log("¡Puente 3D cargado correctamente con colores!");

            // Asignar piezas para animación (usando los mismos nombres)
            puenteTablero = model.getObjectByName('Tablero_Puente') || model;
            aguaSuperficie = model.getObjectByName('Superficie_Agua');
            marcadorFuego = model.getObjectByName('Punto_Sensor_Temp');

            if (marcadorFuego) marcadorFuego.visible = false;
        }, undefined, (err) => {
            console.error("Error al cargar puente.glb:", err);
        });

        // CONSULTA DE DATOS A THINGER.IO
        async function pedirDatos() {
            try {
                const res = await fetch(API_URL, {
                    headers: { 'Authorization': `Bearer ${BEARER_TOKEN}` }
                });
                if (!res.ok) {
                    console.log("Esperando respuesta válida de Thinger.io... Status:", res.status);
                    return;
                }
                const json = await res.json();
                const datos = json.in ? json.in.out : (json.out || json);

                actualizar3D(datos);
            } catch (e) {
                console.log("Esperando conexión con ESP32...");
            }
        }

        setInterval(pedirDatos, 300);

        function actualizar3D(d) {
            const temp = d.temperatura || 0;
            const dist = d.distancia_agua || 0;
            const rotX = d.inclinacion_x || 0;
            const rotY = d.inclinacion_y || 0;

            document.getElementById('txt-agua').innerText = dist.toFixed(1);
            document.getElementById('txt-rotx').innerText = rotX.toFixed(3);
            document.getElementById('txt-temp').innerText = temp.toFixed(1);

            if (puenteTablero) {
                puenteTablero.rotation.z = rotX * 0.2;
                puenteTablero.rotation.x = rotY * 0.2;
            }

            if (aguaSuperficie) {
                aguaSuperficie.position.y = (100 - dist) * 0.05;
            }

            const txtFuego = document.getElementById('txt-fuego');
            if (temp > 45) {
                txtFuego.innerText = "¡ALERTA DE FUEGO!";
                txtFuego.className = "fuego";
                if (marcadorFuego) {
                    marcadorFuego.visible = true;
                    marcadorFuego.material = matFuego;
                }
            } else {
                txtFuego.innerText = "Normal";
                txtFuego.className = "";
                if (marcadorFuego) marcadorFuego.visible = false;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
