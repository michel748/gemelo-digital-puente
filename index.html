<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gemelo Digital - Puente</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; }
        #overlay { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); color: white; padding: 15px; border-radius: 8px; z-index: 10; font-family: sans-serif; }
        .val { color: #00d2ff; font-weight: bold; }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }}
    </script>
</head>
<body>
    <div id="overlay">
        <h3>Gemelo Digital en Vivo</h3>
        <p>Agua (HC-SR04): <span id="txt-agua" class="val">--</span> cm</p>
        <p>Inclinación X (MPU): <span id="txt-rotx" class="val">--</span> °</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(40, 40, 40); 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        new OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 2.0));

        let tablero, agua;
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/michel748/gemelo-digital-puente/main/PUENTES1.glb', (gltf) => {
            scene.add(gltf.scene);
            // Identificación de objetos
            tablero = gltf.scene.getObjectByName('Tablero_Puente');
            agua = gltf.scene.getObjectByName('Superficie_Agua');
        });

        async function actualizar() {
            try {
                const res = await fetch("https://api.thingspeak.com/channels/3420779/feeds/last.json");
                const d = await res.json();
                
                const aguaDist = parseFloat(d.field3) || 27;
                const rotX = parseFloat(d.field4) || 0;

                document.getElementById('txt-agua').innerText = aguaDist.toFixed(1);
                document.getElementById('txt-rotx').innerText = rotX.toFixed(2);

                // Rotación del tablero (suavizada con factor 0.1)
                if (tablero) tablero.rotation.z = THREE.MathUtils.degToRad(rotX) * 0.1;
                
                // Visualización del agua: 
                // Usamos 27 como altura máxima, multiplicamos por 0.5 para que el movimiento sea visible
                if (agua) {
                    let alturaVisibilidad = Math.max(0, 27 - aguaDist);
                    agua.position.y = alturaVisibilidad * 0.5;
                }

            } catch(e) { console.error("Error al leer ThingSpeak"); }
        }

        setInterval(actualizar, 3000);
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
