<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gemelo Digital - Puente y Nivel de Agua</title>
    <style>
        body { margin: 0; background-color: #0b0d19; font-family: Arial, sans-serif; overflow: hidden; }
        #info-panel {
            position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.8);
            color: white; padding: 15px; border-radius: 8px; z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #info-panel h2 { margin-top: 0; font-size: 18px; color: #00d2ff; }
    </style>
    <!-- Importar Three.js y GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="info-panel">
        <h2>📊 Gemelo Digital en Vivo</h2>
        <p>Agua (HC-SR04): <span id="val-agua">--</span> cm</p>
        <p>Inclinación X (MPU): <span id="val-x">--</span> °</p>
        <p>Temperatura (DHT22): <span id="val-temp">--</span> °C</p>
    </div>

    <script>
        let scene, camera, renderer, mallaAgua;
        const ALTURA_MAXIMA_CM = 27.0; // Altura total de referencia de tu puente

        function init() {
            // 1. Escena, Cámara y Renderizador
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 10, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Luz
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            // 2. CREAR EL AGUA INDEPENDIENTE (Un plano separado que sube y baja)
            // Ajusta el ancho y largo (ej: 6x10) según las dimensiones de tu río/canal en el GLB
            const geometriaAgua = new THREE.PlaneGeometry(6, 10); 
            const materialAgua = new THREE.MeshStandardMaterial({ 
                color: 0x00aaff, 
                transparent: true, 
                opacity: 0.8,
                roughness: 0.1
            });
            mallaAgua = new THREE.Mesh(geometriaAgua, materialAgua);
            mallaAgua.rotation.x = -Math.PI / 2; // Acostar el plano para que sea horizontal
            mallaAgua.position.set(0, 0, 0);   // Posición inicial base
            scene.add(mallaAgua);

            // 3. Cargar el Puente GLB desde GitHub
            const loader = new THREE.GLTFLoader();
            loader.load('URL_DE_TU_MODELO_EN_GITHUB/puente.glb', function (gltf) {
                scene.add(gltf.scene);
            }, undefined, function (error) {
                console.error("Error al cargar el GLB:", error);
            });

            window.addEventListener('resize', onWindowResize, false);
            
            // Iniciar la consulta periódica a ThingSpeak
            setInterval(obtenerDatosThingSpeak, 10000); // Cada 10 segundos
            obtenerDatosThingSpeak(); // Primera llamada inmediata
        }

        // Función para conectar a ThingSpeak y obtener el Field 3 (Agua)
        async function obtenerDatosThingSpeak() {
            try {
                // Reemplaza con tu Channel ID y Read API Key si es privado
                let response = await fetch('https://api.thingspeak.com/channels/3420779/feeds.json?results=1');
                let data = await response.json();
                let feed = data.feeds[0];

                let nivelAguaCm = parseFloat(feed.field3) || 0;
                let temp = parseFloat(feed.field1) || 0;
                let incX = parseFloat(feed.field4) || 0;

                // Actualizar textos en la interfaz
                document.getElementById('val-agua').innerText = nivelAguaCm.toFixed(1);
                document.getElementById('val-temp').innerText = temp.toFixed(1);
                document.getElementById('val-x').innerText = incX.toFixed(2);

                // 4. ACTUALIZAR LA POSICIÓN Y DEL AGUA EN EL MUNDO 3D
                // Mapeamos los centímetros reales a la escala de tu escena 3D.
                // Si 27 cm equivalen, por ejemplo, a 3 unidades de altura en Three.js:
                let alturaMinimaEnEscena = 0.0; 
                let alturaMaximaEnEscena = 3.0; 
                
                let escalaY = (nivelAguaCm / ALTURA_MAXIMA_CM) * alturaMaximaEnEscena;
                
                // Evitar que rebase los límites lógicos visuales
                if (escalaY < 0) escalaY = 0;
                if (escalaY > alturaMaximaEnEscena) escalaY = alturaMaximaEnEscena;

                // Movemos el objeto del agua de forma independientemente al puente
                mallaAgua.position.y = escalaY;

            } catch (error) {
                console.error("Error al obtener datos de ThingSpeak:", error);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
